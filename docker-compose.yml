services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      # persist ChromaDB data across restarts and rebuilds
      - chroma_data:/app/data/chroma
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        # VITE_API_URL is baked into the React build at compile time.
        # It must be the URL the user's browser can reach — not an internal hostname.
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chroma_data:
